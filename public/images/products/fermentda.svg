<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <!-- Background -->
  <rect width="320" height="180" fill="#F0F9FF"/>
  <circle cx="280" cy="160" r="100" fill="#BAE6FD" opacity="0.35"/>
  <circle cx="0" cy="0" r="70" fill="#DBEAFE" opacity="0.4"/>

  <!-- Fermentation flask -->
  <g transform="translate(80, 18)">
    <!-- Flask body -->
    <path d="M50 50 L30 110 Q28 128 50 130 Q72 132 72 110 L52 50Z" fill="#BAE6FD" stroke="#0284C7" stroke-width="2" stroke-linejoin="round"/>
    <!-- Flask neck -->
    <rect x="43" y="20" width="18" height="34" rx="4" fill="#E0F2FE" stroke="#0284C7" stroke-width="2"/>
    <!-- Flask top -->
    <rect x="40" y="15" width="24" height="10" rx="5" fill="#0284C7"/>
    <!-- Liquid level -->
    <path d="M32 100 Q50 94 70 100 L72 110 Q70 128 50 130 Q28 128 30 110Z" fill="#38BDF8" opacity="0.5"/>
    <!-- Bubbles -->
    <circle cx="44" cy="108" r="5" fill="#7DD3FC" opacity="0.7"/>
    <circle cx="56" cy="96" r="4" fill="#BAE6FD" opacity="0.8"/>
    <circle cx="48" cy="82" r="3" fill="#7DD3FC" opacity="0.6"/>
    <circle cx="60" cy="112" r="3.5" fill="#BAE6FD" opacity="0.7"/>
    <circle cx="38" cy="88" r="2.5" fill="#38BDF8" opacity="0.5"/>
    <!-- Rising bubbles outside -->
    <circle cx="42" cy="60" r="3" fill="#BAE6FD" opacity="0.5"/>
    <circle cx="58" cy="52" r="2" fill="#7DD3FC" opacity="0.4"/>
    <circle cx="50" cy="44" r="2.5" fill="#BAE6FD" opacity="0.4"/>
  </g>

  <!-- Pig icon -->
  <g transform="translate(188, 45)">
    <!-- Body -->
    <ellipse cx="52" cy="62" rx="40" ry="30" fill="#1E40AF" opacity="0.10"/>
    <!-- Head -->
    <circle cx="92" cy="48" r="24" fill="#1E40AF" opacity="0.12"/>
    <!-- Ear left -->
    <ellipse cx="80" cy="28" rx="9" ry="12" fill="#3B82F6" opacity="0.3" transform="rotate(-15 80 28)"/>
    <!-- Ear right -->
    <ellipse cx="104" cy="28" rx="9" ry="12" fill="#3B82F6" opacity="0.3" transform="rotate(15 104 28)"/>
    <!-- Eye -->
    <circle cx="87" cy="44" r="3.5" fill="#1E3A8A"/>
    <circle cx="88" cy="43" r="1.2" fill="white"/>
    <!-- Snout -->
    <ellipse cx="97" cy="58" rx="11" ry="8" fill="#93C5FD" opacity="0.55"/>
    <circle cx="93" cy="58" r="2" fill="#2563EB" opacity="0.4"/>
    <circle cx="101" cy="58" r="2" fill="#2563EB" opacity="0.4"/>
    <!-- Legs -->
    <rect x="22" y="88" width="8" height="18" rx="4" fill="#1E40AF" opacity="0.13"/>
    <rect x="36" y="88" width="8" height="18" rx="4" fill="#1E40AF" opacity="0.13"/>
    <rect x="58" y="88" width="8" height="18" rx="4" fill="#1E40AF" opacity="0.13"/>
    <rect x="72" y="88" width="8" height="18" rx="4" fill="#1E40AF" opacity="0.13"/>
    <!-- Curly tail -->
    <path d="M14 66 Q2 58 6 46 Q14 50 10 60" stroke="#3B82F6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Badge -->
  <rect x="218" y="10" width="94" height="26" rx="13" fill="#0284C7"/>
  <text x="265" y="27" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="12" font-weight="700">양돈 사료첨가제</text>

  <!-- Spec chip -->
  <rect x="8" y="150" width="126" height="22" rx="6" fill="white" stroke="#BAE6FD" stroke-width="1.5"/>
  <text x="71" y="165" text-anchor="middle" fill="#0369A1" font-family="'Courier New',monospace" font-size="10" font-weight="600">NH₃ 48%↓ · CH₄ 39%↓</text>
</svg>
